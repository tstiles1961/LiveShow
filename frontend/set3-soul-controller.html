  {name:"We're in This Love Together", artist:"Al Jarreau",        time:"0:49:30.912", dur:"3:47"},
  {name:"Get Lucky",                   artist:"Daft Punk",         time:"0:53:18.250", dur:"4:24"},
  {name:"Sledgehammer",                artist:"Peter Gabriel",     time:"0:57:42.907", dur:"5:03"},

function transport(action){const btn=document.querySelector(`.t-${action}`);if(btn){btn.classList.add('fired');setTimeout(()=>btn.classList.remove('fired'),500);}const uuid=KM_TRANSPORT[action];if(!uuid||uuid.includes('PASTE-HERE')){showToast(`⚠  Set KM UUID for: ${action.toUpperCase()}`);return;}window.location.href = KM_BASE + encodeURIComponent(uuid); showToast(`${action.toUpperCase()} → sent`);}
function splitTime(t){const dot=t.lastIndexOf('.');return{main:dot===-1?t:t.substring(0,dot),ms:''};}
function renderGrid(){const grid=document.getElementById('songGrid');grid.innerHTML='';SONGS.forEach((song,i)=>{const{main,ms}=splitTime(song.time);const card=document.createElement('div');card.className='song-card';card.innerHTML=`<div class="track-num">${String(i+1).padStart(2,'0')}</div><div class="song-info"><div class="song-name">${esc(song.name)}</div><div class="song-artist">${esc(song.artist)}</div></div><div class="dur-badge">${esc(song.dur)}</div><button class="go-btn" onclick="goToSong(${i})" title="${esc(main+ms)}">GO</button>`;grid.appendChild(card);});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function goToSong(index){document.querySelectorAll('.song-card').forEach((c,i)=>c.classList.toggle('active',i===index));const song=SONGS[index];const{main,ms}=splitTime(song.time);document.getElementById('playheadTime').innerHTML=`${esc(main)}<span class="ms">${esc(ms)}</span>`;document.getElementById('playheadSong').textContent=song.name;document.getElementById('nowPlayingHeader').textContent=song.name;document.querySelectorAll('.song-card')[index].classList.add('flash');setTimeout(()=>document.querySelectorAll('.song-card')[index].classList.remove('flash'),600);setStatus('Sending…','#f5c842');window.location.href = KM_BASE + encodeURIComponent(KM_GOTO) + '&value=' + encodeURIComponent(song.time); showToast(`▶  ${song.name}  →  ${song.time.split('.')[0]}`); setStatus('Sent ✓', '#00e676'); setTimeout(() => setStatus('Ready', null), 1800);}
function setStatus(text,color){document.getElementById('statusText').textContent=text;const dot=document.getElementById('statusDot');dot.classList.remove('live');if(color){dot.style.background=color;dot.style.boxShadow=`0 0 10px ${color}`;}else{dot.style.background='';dot.style.boxShadow='';dot.classList.add('live');}}
function exportJSON(){const blob=new Blob([JSON.stringify({project:'Set 3 Soul & Groove',songs:SONGS},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='set3-soul-songs.json';a.click();showToast('⬇  Exported JSON');}
let toastTimer;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
document.addEventListener('keydown',e=>{if(!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){const n=parseInt(e.key);if(n>=1&&n<=9&&n<=SONGS.length)goToSong(n-1);}});
renderGrid();
localStorage.setItem('tstiles_currentSet', 'Set3');
localStorage.setItem('tstiles_currentFile', 'Set 3 Soul & Groove.band');
</script>
