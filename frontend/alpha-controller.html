<style>
:root{

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg-deep);color:var(--text-main);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
.hero{position:relative;width:100%;height:210px;overflow:hidden;background:radial-gradient(ellipse 60% 70% at 50% 55%,#2c1d00 0%,#140e00 45%,#060408 100%)}
.hero-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-48%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(245,168,0,.18) 0%,rgba(245,168,0,.06) 45%,transparent 70%);animation:glowPulse 3s ease-in-out infinite alternate;pointer-events:none}

.hero-brand{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;text-align:center;padding:0 16px}
.brand-name{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:clamp(2rem,6vw,3.6rem);color:var(--gold);letter-spacing:.08em;line-height:1;text-shadow:0 0 30px rgba(255,200,50,.9),0 0 60px rgba(255,160,0,.5),2px 2px 0 rgba(0,0,0,.8)}
.brand-subtitle{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(.65rem,1.6vw,.9rem);color:var(--gold-bright);letter-spacing:.38em;text-transform:uppercase;margin-top:5px;text-shadow:0 0 12px rgba(255,200,50,.6),1px 1px 3px rgba(0,0,0,.9)}
.ribbon-wrap{margin-top:10px}
.ribbon-bar{width:min(92vw,760px);max-width:100%;background:linear-gradient(180deg,#a10000,#6f0000);border-radius:999px;padding:7px 18px;color:#fff9e6;font-family:'Cinzel',serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;box-shadow:0 3px 8px rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.transport-bar{display:flex;background:#040608;border-bottom:2px solid rgba(245,200,66,.2);padding:10px 12px;gap:8px;justify-content:center;flex-wrap:wrap}
.t-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;border-radius:8px;cursor:pointer;padding:10px 18px;min-width:80px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.12em;color:var(--white);transition:filter .15s,transform .1s;border:1px solid rgba(255,255,255,.08);text-shadow:0 1px 3px rgba(0,0,0,.7);position:relative;overflow:hidden;background:#1d2738}
.t-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none}
.t-btn:hover{filter:brightness(1.25);transform:translateY(-1px)}
.t-btn:active{filter:brightness(.85);transform:translateY(1px)}
.t-btn .t-icon{font-size:1.4rem;line-height:1}.t-btn .t-label{font-family:'Oswald',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.2em;opacity:.85}
.t-start{background:linear-gradient(160deg,#1a5c30,#0a2e18)} .t-stop{background:linear-gradient(160deg,#8b2020,#4a0f0f)} .t-play{background:linear-gradient(160deg,#1a7a38,#0a3c1c)} .t-record{background:linear-gradient(160deg,#b82020,#6e0f0f)} .t-fade{background:linear-gradient(160deg,#5a2a8b,#2c1246)}
.set-nav{display:flex;background:#06080c;border-bottom:3px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.6)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 8px;font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.15em;color:var(--text-dim);border-right:1px solid rgba(245,200,66,.12);transition:background .15s,color .15s;line-height:1;gap:3px;position:relative}
.nav-btn:last-child{border-right:none}
.nav-btn span{font-family:'Cinzel',serif;font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);opacity:.65;transition:color .15s,opacity .15s}
.nav-btn:hover{background:rgba(245,200,66,.07);color:var(--gold)}.nav-btn:hover span{color:var(--gold);opacity:1}
.nav-btn.active{background:rgba(245,200,66,.12);color:var(--gold);border-bottom:3px solid var(--gold);margin-bottom:-3px;box-shadow:0 0 14px rgba(245,200,66,.15)}
.nav-btn.active span{color:var(--gold-bright);opacity:1}
.container{max-width:1160px;margin:0 auto;padding:16px 14px 60px}
.status-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:2px solid var(--border-gold);border-radius:10px;padding:10px 16px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.status-indicator{display:flex;align-items:center;gap:8px;font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}
.dot{width:11px;height:11px;border-radius:50%;background:#00e676;box-shadow:0 0 10px #00e676,0 0 20px rgba(0,230,118,.4);flex-shrink:0}
.now-playing{font-family:'Cinzel',serif;font-size:.92rem;font-weight:700;color:var(--gold);letter-spacing:.06em;text-align:right;max-width:560px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 0 12px var(--gold-glow)}
.song-grid{display:grid;grid-template-columns:1fr;gap:6px}
.song-card{background:var(--bg-card);border:2px solid var(--border-gold);border-radius:9px;display:flex;align-items:center;overflow:hidden;min-height:58px;transition:border-color .15s,background .15s,transform .15s}
.song-card:hover{border-color:var(--gold);background:var(--bg-hover);transform:translateX(3px)}
.track-num{width:58px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--gold-dark);border-right:2px solid var(--border-gold);flex-shrink:0;letter-spacing:.05em}
.song-main{flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 14px;min-width:0}
.song-name{font-family:'Oswald',sans-serif;font-size:clamp(1rem,2.4vw,1.18rem);font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white)}
.song-artist{font-family:'DM Mono',monospace;font-size:clamp(.8rem,1.8vw,.96rem);color:#d7e7fb;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;text-align:right;text-shadow:0 0 8px rgba(255,255,255,.12);max-width:42%;flex-shrink:0}
.dur-badge,.type-badge{width:84px;text-align:center;color:var(--text-dim);font-size:.78rem}
.go-btn{margin-right:8px;background:linear-gradient(160deg,#b8860b,#6a4b08);border:none;color:#fff;border-radius:7px;padding:9px 12px;font-family:'Bebas Neue',sans-serif;letter-spacing:.15em;cursor:pointer}
.panel{background:var(--bg-card);border:2px solid var(--border-gold);border-radius:12px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.28)}
.panel h2{font-family:'Oswald',sans-serif;font-size:1.15rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.panel p,.muted{font-size:.84rem;line-height:1.5;color:var(--text-dim)}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.input,select,textarea,button.input-btn{width:100%;height:46px;background:#091018;border:2px solid var(--border-gold);border-radius:8px;color:#fff;padding:10px 12px;font-family:'DM Mono',monospace}
textarea{height:120px;resize:vertical}
.input-btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(160deg,#6d4c1a,#3f2b0e);font-family:'Oswald',sans-serif;letter-spacing:.12em;text-transform:uppercase}
.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:10px 16px;border-radius:999px;border:2px solid var(--border-gold);background:#091018;color:#fff;font-family:'Oswald',sans-serif;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
.pill.active{background:rgba(245,200,66,.18);border-color:var(--gold);color:var(--gold-bright)}
.small{font-size:.78rem}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px;border-bottom:1px solid rgba(245,200,66,.16);text-align:left;font-size:.84rem;vertical-align:top}
.table th{color:var(--gold-bright);font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase}
#topMenu{position:fixed;top:10px;right:12px;z-index:9999}
#menuButton{font-size:16px;cursor:pointer;color:white;padding:4px 8px;user-select:none;line-height:1;border-radius:6px;background:rgba(8,10,14,.45)}
#menuDropdown{display:none;position:absolute;right:0;margin-top:6px;background:#1c1c1c;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.4);overflow:hidden;min-width:110px}
.menuItem{padding:10px 18px;color:white;font-size:14px;white-space:nowrap;cursor:pointer}
.menuItem:hover{background:#333}

function sendKMCommand(cmd){
  const payload = encodeURIComponent(JSON.stringify(cmd));
  window.location.href = `kmtrigger://macro=${encodeURIComponent(KM_COMMAND)}&value=${payload}`;
  return Promise.resolve();
}
function runSetup(){ window.location.href = "kmtrigger://macro=Setup"; }
function goAdmin(){ window.location.href = "admin-controller.html"; }
(function initTopMenu(){
  const btn=document.getElementById("menuButton"), dd=document.getElementById("menuDropdown");
  if(!btn||!dd) return;
  btn.addEventListener("click", (e)=>{ e.stopPropagation(); dd.style.display = dd.style.display === "block" ? "none" : "block"; });
  document.addEventListener("click", ()=>{ dd.style.display = "none"; });
})();
function transport(action){ sendKMCommand({action:action, source:(document.body.dataset.page||'controller')}); }
function byType(typeVal) {
  if (typeVal === 'ALL') return ALL_SONGS.slice();
  return ALL_SONGS.filter(s => String(s.type || '').toLowerCase() === typeVal.toLowerCase());
}

let currentMode = 'ALL';
function setMode(mode){
  currentMode = mode;
  document.getElementById('modeAll').classList.toggle('active', mode === 'ALL');
  document.getElementById('modeVocal').classList.toggle('active', mode === 'Vocal');
  renderGrid();
}
function filteredSongs(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase().trim();
  return byType(currentMode).filter(s=>!q || s.song_name.toLowerCase().includes(q) || String(s.artist||'').toLowerCase().includes(q));
}
function renderGrid(){
  const songs=filteredSongs();
  document.getElementById('songCount').textContent = songs.length;
  const grid=document.getElementById('songGrid');
  grid.innerHTML='';
  songs.forEach(song=>{
    const card=document.createElement('div'); card.className='song-card';
    const artist = song.artist || 'Artist pending';
    card.innerHTML=`<div class="track-num">${song.set_list_id}</div>
      <div class="song-main">
        <div class="song-name">${song.song_name}</div>
        <div class="song-artist">${artist}</div>
      </div>
      <div class="type-badge">${song.type || ''}</div>
      <button class="go-btn" onclick="goToSong(${song.song_master_id})">GO</button>`;
    grid.appendChild(card);
  });
}
function goToSong(songMasterID){
  const song=ALL_SONGS.find(s=>s.song_master_id===songMasterID); if(!song) return;
  const setId = Number(song.set_list_id) || 1;
  const bandFile = BAND_FILES[setId];
  updateStatus(song.song_name + ' — ' + (song.artist || ''));
  updateStageOverlay({artist:(song.artist || ''), section:'Intro', note:(song.song_name || ''), songName:(song.song_name || '')});
  sendKMCommand({
    action:'jumpToSong',
    set_list_id:setId,
    song_master_id:song.song_master_id,
    time:song.gb_time,
    songName:song.song_name,
    artist:(song.artist || ''),
    source:'all-controller',
    band_file_name:bandFile,
    band_file_path:BAND_BASE_PATH + bandFile
  });
}
function updateStatus(msg){ document.getElementById('nowPlayingHeader').textContent = msg; }
document.getElementById('searchBox').addEventListener('input', renderGrid);
renderGrid();

function updateStageOverlay(data){
  try{
    localStorage.setItem("LiveShow_Overlay", JSON.stringify(data || {}));
  }catch(err){
    console.warn("Stage overlay update failed", err);
  }
}
